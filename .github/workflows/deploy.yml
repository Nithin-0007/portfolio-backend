name: Deploy Backend to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build

      - name: Copy Prisma Binary
        run: |
          mkdir -p .aws-sam/build/PortfolioLambda/node_modules/.prisma/client
          cp node_modules/.prisma/client/libquery_engine-rhel-openssl-3.0.x.so.node .aws-sam/build/PortfolioLambda/node_modules/.prisma/client/
          cp node_modules/.prisma/client/schema.prisma .aws-sam/build/PortfolioLambda/node_modules/.prisma/client/

      - name: SAM Deploy
        run: >
          sam deploy
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --stack-name portfolio-backend
          --capabilities CAPABILITY_IAM
          --resolve-s3
          --region us-east-1
          --parameter-overrides DatabaseUrl="${{ secrets.DATABASE_URL }}"
