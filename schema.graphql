type User {
  id: ID!
  username: String!
  name: String!
  email: String!
  phone: String
  role: String!
  status: String!
  avatar: String
  heroContent: HeroContent
  aboutContent: AboutContent
  projects: [Project]
  skills: [Skill]
  experiences: [Experience]
}

type HeroContent {
  id: ID!
  greeting: String
  name: String
  roles: [String]
  description: String
}

type AboutContent {
  id: ID!
  bio1: String
  bio2: String
  highlights: [String]
  location: String
  email: String
  phone: String
  availability: String
  github: String
  linkedin: String
  twitter: String
  profileImage: String
  cvUrl: String
  experienceTitle: String
  snippetRole: String
  snippetPassion: String
  snippetCoffee: String
}

type Project {
  id: ID!
  title: String!
  description: String!
  tags: [String]
  category: String
  icon: String
  color: String
  github: String
  live: String
  featured: Boolean
  published: Boolean
  order: Int
}

type Skill {
  id: ID!
  label: String!
  value: Int!
  category: String!
  icon: String
  order: Int
}

type Experience {
  id: ID!
  role: String!
  company: String!
  period: String!
  type: String!
  icon: String
  color: String
  points: [String]
  order: Int
}

type ChatMessage {
  id: ID!
  sessionId: String!
  role: String!
  content: String!
  createdAt: String!
}

type Achievement {
  id: ID!
  title: String!
  order: Int
}

type Event {
  id: ID!
  title: String!
  description: String
  date: String!
  endDate: String
  location: String
  virtual: Boolean
  meetingUrl: String
  type: String
  status: String
  featured: Boolean
  image: String
  tags: [String]
  capacity: Int
}

type Notification {
  id: ID!
  title: String!
  message: String!
  type: String
  read: Boolean
  createdAt: String
}

type ContactMessage {
  id: ID!
  name: String!
  email: String!
  subject: String!
  message: String!
  read: Boolean
  createdAt: String
}

type SiteSettings {
  id: ID!
  heroTagline: String
  footerText: String
  heroStats: [String]
  quickLinks: [String]
}

type PortfolioData {
  user: User
  hero: HeroContent
  about: AboutContent
  projects: [Project]
  skills: [Skill]
  experiences: [Experience]
  achievements: [Achievement]
  events: [Event]
  siteSettings: SiteSettings
}

# Pagination types
type PageInfo {
  total: Int!
  page: Int!
  limit: Int!
  totalPages: Int!
  hasNext: Boolean!
  hasPrev: Boolean!
}

type ProjectsPage {
  items: [Project]!
  pageInfo: PageInfo!
}

type SkillsPage {
  items: [Skill]!
  pageInfo: PageInfo!
}

type ExperiencesPage {
  items: [Experience]!
  pageInfo: PageInfo!
}

type AchievementsPage {
  items: [Achievement]!
  pageInfo: PageInfo!
}

type EventsPage {
  items: [Event]!
  pageInfo: PageInfo!
}

type MessagesPage {
  items: [ContactMessage]!
  pageInfo: PageInfo!
}

type NotificationsPage {
  items: [Notification]!
  pageInfo: PageInfo!
}

type Query {
  getPortfolio(username: String!): PortfolioData

  getProjects(
    username: String!
    admin: Boolean
    page: Int
    limit: Int
    search: String
    category: String
    featured: Boolean
    published: Boolean
    sortBy: String
    sortOrder: String
  ): ProjectsPage

  getSkills(
    username: String!
    page: Int
    limit: Int
    search: String
    category: String
    sortBy: String
    sortOrder: String
  ): SkillsPage

  getExperiences(
    username: String!
    page: Int
    limit: Int
    search: String
    type: String
    sortBy: String
    sortOrder: String
  ): ExperiencesPage

  getAchievements(
    username: String!
    page: Int
    limit: Int
    search: String
    sortBy: String
    sortOrder: String
  ): AchievementsPage

  getEvents(
    username: String!
    page: Int
    limit: Int
    search: String
    type: String
    status: String
    featured: Boolean
    sortBy: String
    sortOrder: String
  ): EventsPage

  getMessages(
    username: String!
    page: Int
    limit: Int
    search: String
    read: Boolean
    sortBy: String
    sortOrder: String
  ): MessagesPage

  getNotifications(
    username: String!
    page: Int
    limit: Int
    read: Boolean
    type: String
    sortBy: String
    sortOrder: String
  ): NotificationsPage
}

type Mutation {
  saveHero(userId: ID!, input: HeroInput!): HeroContent
  saveAbout(userId: ID!, input: AboutInput!): AboutContent

  upsertProject(userId: ID!, input: ProjectInput!): Project
  deleteProject(id: ID!): Boolean

  upsertSkill(userId: ID!, input: SkillInput!): Skill
  deleteSkill(id: ID!): Boolean

  upsertExperience(userId: ID!, input: ExperienceInput!): Experience
  deleteExperience(id: ID!): Boolean

  upsertAchievement(userId: ID!, input: AchievementInput!): Achievement
  deleteAchievement(id: ID!): Boolean

  upsertEvent(userId: ID!, input: EventInput!): Event
  deleteEvent(id: ID!): Boolean

  deleteMessage(id: ID!): Boolean
  markMessageRead(id: ID!): ContactMessage

  sendMessage(
    name: String!
    email: String!
    subject: String!
    message: String!
    targetUsername: String!
  ): ContactMessage

  chatWithAI(
    message: String!
    sessionId: String!
    history: [ChatInputMessage]
  ): ChatMessage
}

input HeroInput {
  greeting: String
  name: String
  roles: [String]
  description: String
}

input AboutInput {
  bio1: String
  bio2: String
  highlights: [String]
  location: String
  email: String
  phone: String
  availability: String
  github: String
  linkedin: String
  twitter: String
  profileImage: String
  cvUrl: String
  experienceTitle: String
  snippetRole: String
  snippetPassion: String
  snippetCoffee: String
}

input ProjectInput {
  id: ID
  title: String!
  description: String!
  tags: [String]
  category: String
  icon: String
  color: String
  github: String
  live: String
  featured: Boolean
  published: Boolean
  order: Int
}

input SkillInput {
  id: ID
  label: String!
  value: Int!
  category: String!
  icon: String
  order: Int
}

input ExperienceInput {
  id: ID
  role: String!
  company: String!
  period: String!
  type: String!
  icon: String
  color: String
  points: [String]
  order: Int
}

input AchievementInput {
  id: ID
  title: String!
  order: Int
}

input EventInput {
  id: ID
  title: String!
  description: String
  date: String!
  endDate: String
  location: String
  virtual: Boolean
  meetingUrl: String
  type: String
  status: String
  featured: Boolean
  image: String
  tags: [String]
  capacity: Int
}

input ChatInputMessage {
  role: String!
  content: String!
}

type Subscription {
  onChatUpdate(sessionId: String!): ChatMessage
    @aws_subscribe(mutations: ["chatWithAI"])
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
